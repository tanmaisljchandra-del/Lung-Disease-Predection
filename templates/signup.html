<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
background-image:url("/static/imgh8.jpg");
background-size:cover;
background-position:center;
}

.card{
background:white;
padding:30px;
width:320px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
margin-top:16px;
background:#1e90ff;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.error{
color:#c62828;
margin-bottom:12px;
}

a{
display:inline-block;
margin-top:12px;
font-size:14px;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Account</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form action="/signup" method="post">

<label>Username</label>
<br>
<input type="text" name="username" required>

<br><br>

<label>Password</label>
<br>
<input type="password" name="password" required>

<br><br>

<button type="submit">Register</button>

</form>

<a href="/">Already have an account? Login</a>
</div>

</body>
</html>
