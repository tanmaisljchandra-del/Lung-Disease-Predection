<!DOCTYPE html>
<html>
<head>

<title>Lung Disease Login</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("/static/imgh8.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{

background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0px 0px 15px rgba(0,0,0,0.3);

}

input{

width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;

}

button{
    opacity:2s;
    margin-top:-35px;
    background-color:green;
    color:white;
    border-radius: 5px;
    padding-left: 10px;
    padding-right: 10px;
    padding-top: 10px;
    padding-bottom: 10px;
    margin-right: 20px;
    cursor: pointer;
    border-color: brown;
    border: none;

}

a{
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h2>User Login</h2>

{% if message %}
<p style="color:green;">{{ message }}</p>
{% endif %}

{% if error %}
<p style="color:#c62828;">{{ error }}</p>
{% endif %}

<form action="/" method="post">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="/signup">New user? Create Account</a>

</div>

</body>
</html>
